<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const path = window.location.pathname.replace(/\/$/, '');
      const repo = '/smart-shopper-service';
      const redirect = `${repo}${path}${window.location.search}${window.location.hash}`;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
